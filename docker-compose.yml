version: '3.8'

services:

  # ─── INFRASTRUCTURE ───────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: trace-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7-jammy
    container_name: trace-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:latest
    container_name: trace-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: trace-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── SPRING BOOT SERVICES ─────────────────────

  discovery-server:
    build: ./discovery-server
    container_name: trace-discovery
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  user-service:
    build: ./user-service
    container_name: trace-user
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_HOST: discovery-server
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  transaction-service:
    build: ./transaction-service
    container_name: trace-transaction
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_HOST: kafka
      EUREKA_HOST: discovery-server
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  risk-engine-service:
    build: ./risk-engine-service
    container_name: trace-risk-engine
    ports:
      - "8083:8083"
    environment:
      DB_HOST: postgres
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_HOST: kafka
      REDIS_HOST: redis
      EUREKA_HOST: discovery-server
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  alert-service:
    build: ./alert-service
    container_name: trace-alert
    ports:
      - "8084:8084"
    environment:
      KAFKA_HOST: kafka
      EUREKA_HOST: discovery-server
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO}
    depends_on:
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  audit-log-service:
    build: ./audit-log-service
    container_name: trace-audit
    ports:
      - "8085:8085"
    environment:
      MONGO_HOST: mongodb
      KAFKA_HOST: kafka
      EUREKA_HOST: discovery-server
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  api-gateway:
    build: ./api-gateway
    container_name: trace-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_HOST: discovery-server
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      discovery-server:
        condition: service_healthy

volumes:
  postgres-data:
  mongo-data: