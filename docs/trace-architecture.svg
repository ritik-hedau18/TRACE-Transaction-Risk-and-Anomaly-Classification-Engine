<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" width="900" height="640" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-kafka" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-dashed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="640" fill="url(#bg-grad)" rx="12"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-width="0.3" opacity="0.04">
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="0" y1="500" x2="900" y2="500"/>
    <line x1="150" y1="0" x2="150" y2="640"/>
    <line x1="300" y1="0" x2="300" y2="640"/>
    <line x1="450" y1="0" x2="450" y2="640"/>
    <line x1="600" y1="0" x2="600" y2="640"/>
    <line x1="750" y1="0" x2="750" y2="640"/>
  </g>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#f8fafc" letter-spacing="4">TRACE</text>
  <text x="450" y="55" text-anchor="middle" font-size="11" fill="#64748b" letter-spacing="2">TRANSACTION RISK AND ANOMALY CLASSIFICATION ENGINE</text>

  <!-- ─── CLIENT ─── -->
  <rect x="350" y="76" width="200" height="44" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="450" y="103" text-anchor="middle" font-size="13" font-weight="600" fill="#cbd5e1">Client</text>
  <line x1="450" y1="120" x2="450" y2="148" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ─── API GATEWAY ─── -->
  <rect x="280" y="150" width="340" height="56" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
  <text x="450" y="175" text-anchor="middle" font-size="14" font-weight="700" fill="#e0e7ff">API Gateway</text>
  <text x="450" y="196" text-anchor="middle" font-size="11" fill="#a5b4fc">JWT Authentication + Routing  ·  :8080</text>

  <!-- Gateway → User Service -->
  <line x1="340" y1="206" x2="195" y2="268" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Gateway → Transaction Service -->
  <line x1="450" y1="206" x2="450" y2="268" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Gateway → Discovery Server (dashed) -->
  <line x1="560" y1="206" x2="715" y2="268" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arr-dashed)"/>

  <!-- ─── USER SERVICE ─── -->
  <rect x="80" y="270" width="220" height="56" rx="8" fill="#134e4a" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="190" y="295" text-anchor="middle" font-size="13" font-weight="700" fill="#ccfbf1">User Service</text>
  <text x="190" y="314" text-anchor="middle" font-size="11" fill="#5eead4">Register · Login · JWT  ·  :8081</text>

  <!-- ─── TRANSACTION SERVICE ─── -->
  <rect x="330" y="270" width="240" height="56" rx="8" fill="#134e4a" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="450" y="295" text-anchor="middle" font-size="13" font-weight="700" fill="#ccfbf1">Transaction Service</text>
  <text x="450" y="314" text-anchor="middle" font-size="11" fill="#5eead4">Submit transactions  ·  :8082</text>

  <!-- ─── DISCOVERY SERVER ─── -->
  <rect x="610" y="270" width="210" height="56" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="715" y="295" text-anchor="middle" font-size="13" font-weight="600" fill="#cbd5e1">Discovery Server</text>
  <text x="715" y="314" text-anchor="middle" font-size="11" fill="#64748b">Eureka Registry  ·  :8761</text>

  <!-- Transaction Service → Kafka -->
  <line x1="450" y1="326" x2="450" y2="380" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr-kafka)"/>

  <!-- ─── KAFKA ─── -->
  <rect x="210" y="382" width="480" height="48" rx="8" fill="#451a03" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="411" text-anchor="middle" font-size="14" font-weight="700" fill="#fef3c7">⚡  Apache Kafka Event Bus</text>

  <!-- Kafka → Risk Engine -->
  <line x1="330" y1="430" x2="230" y2="482" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr-kafka)"/>
  <!-- Kafka → Audit Log -->
  <line x1="570" y1="430" x2="670" y2="482" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr-kafka)"/>

  <!-- ─── RISK ENGINE SERVICE ─── -->
  <rect x="80" y="484" width="270" height="56" rx="8" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="215" y="509" text-anchor="middle" font-size="13" font-weight="700" fill="#fee2e2">Risk Engine Service</text>
  <text x="215" y="528" text-anchor="middle" font-size="11" fill="#fca5a5">Rule-based fraud detection</text>

  <!-- Risk Engine → Alert Service -->
  <line x1="215" y1="540" x2="215" y2="574" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ─── ALERT SERVICE ─── -->
  <rect x="80" y="576" width="270" height="48" rx="8" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="215" y="600" text-anchor="middle" font-size="13" font-weight="700" fill="#fee2e2">Alert Service</text>
  <text x="215" y="616" text-anchor="middle" font-size="11" fill="#fca5a5">Email notifications via Kafka</text>

  <!-- ─── AUDIT LOG SERVICE ─── -->
  <rect x="550" y="484" width="270" height="56" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="685" y="509" text-anchor="middle" font-size="13" font-weight="700" fill="#dbeafe">Audit Log Service</text>
  <text x="685" y="528" text-anchor="middle" font-size="11" fill="#93c5fd">MongoDB audit trail</text>

  <!-- ─── DATA STORES ─── -->
  <!-- PostgreSQL -->
  <rect x="80" y="560" width="0" height="0"/><!-- spacer -->

  <!-- Postgres pill (under User + Transaction) -->
  <rect x="330" y="576" width="150" height="36" rx="18" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="405" y="598" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">PostgreSQL</text>

  <!-- MongoDB pill (under Audit) -->
  <rect x="620" y="576" width="130" height="36" rx="18" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="685" y="598" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">MongoDB</text>

  <!-- Dashed lines to DBs -->
  <line x1="405" y1="540" x2="405" y2="575" stroke="#475569" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-dashed)"/>
  <line x1="685" y1="540" x2="685" y2="575" stroke="#475569" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-dashed)"/>

  <!-- ─── LEGEND ─── -->
  <line x1="30" y1="596" x2="55" y2="596" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="60" y="600" font-size="10" fill="#64748b">HTTP</text>
  <line x1="30" y1="614" x2="55" y2="614" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr-kafka)"/>
  <text x="60" y="618" font-size="10" fill="#64748b">Kafka event</text>
  <line x1="115" y1="596" x2="140" y2="596" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-dashed)"/>
  <text x="145" y="600" font-size="10" fill="#64748b">Eureka / Data</text>

</svg>
